<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>挑战星球 · AI打卡教练</title>
<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
<script src="/static/nexus-ui/js/nexus-api-error.js"></script>
<script src="/static/nexus-ui/js/nexus-api.js?v=3"></script>
<style>
.split-bg { background: radial-gradient(circle at 20% 50%, rgba(99,91,255,.15), transparent 50%), radial-gradient(circle at 80% 80%, rgba(129,140,248,.12), transparent 50%); }
.login-input { background: rgba(255,255,255,0.04); border: 1px solid var(--card-border); transition: all .2s; color: var(--text-primary); }
.login-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); outline: none; }
.mode-tab { padding: 10px; text-align: center; cursor: pointer; font-size: 14px; font-weight: 600; border-bottom: 2px solid transparent; color: var(--text-muted); transition: all .2s; }
.mode-tab.active { color: var(--primary-light); border-bottom-color: var(--primary); }
.login-btn { padding: 12px; border: none; border-radius: var(--radius-sm); background: var(--primary); color: #fff; font-weight: 600; cursor: pointer; font-size: 14px; transition: all .2s; }
.login-btn:hover:not(:disabled) { background: var(--primary-light); }
.login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.feature-card { padding: 16px; display: flex; align-items: center; gap: 12px; }
.feature-card .ft-title { font-weight: 600; font-size: 14px; }
.feature-card .ft-desc { font-size: 12px; color: var(--text-muted); }
@media (max-width: 768px) { .login-right { display: none; } .login-left { width: 100%; } }
</style>
</head>
<body style="background:var(--bg-grad);color:var(--text-primary);min-height:100vh;">
<div id="app" style="display:flex;min-height:100vh;">
  <div class="login-left" style="flex:1;display:flex;align-items:center;justify-content:center;padding:32px;">
    <div class="glass" style="padding:32px;max-width:380px;width:100%;border-radius:var(--radius-lg);">
      <div style="text-align:center;margin-bottom:28px;">
        <div style="font-size:48px;margin-bottom:8px;">🌍</div>
        <h1 style="font-size:24px;font-weight:700;">挑战星球</h1>
        <p style="font-size:13px;margin-top:4px;color:var(--text-muted);">AI为你规划每一天的坚持</p>
      </div>
      <div style="display:flex;margin-bottom:24px;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--card-border);">
        <div class="mode-tab" :class="{active:mode==='uc'}" style="flex:1;" @click="mode='uc'">UC登录</div>
        <div class="mode-tab" :class="{active:mode==='quick'}" style="flex:1;" @click="mode='quick'">快速体验</div>
      </div>
      <div v-if="mode==='uc'" style="display:flex;flex-direction:column;gap:16px;">
        <div>
          <label style="font-size:12px;display:block;margin-bottom:6px;color:var(--text-secondary);">用户名</label>
          <input v-model="ucForm.username" type="text" class="login-input" style="width:100%;padding:12px 16px;border-radius:var(--radius-sm);font-size:14px;" placeholder="请输入UC用户名">
        </div>
        <div>
          <label style="font-size:12px;display:block;margin-bottom:6px;color:var(--text-secondary);">密码</label>
          <input v-model="ucForm.password" type="password" class="login-input" style="width:100%;padding:12px 16px;border-radius:var(--radius-sm);font-size:14px;" placeholder="请输入密码" @keyup.enter="ucLogin">
        </div>
        <p v-if="loginError" style="font-size:12px;color:var(--red);">{{ loginError }}</p>
        <button class="login-btn" @click="ucLogin" :disabled="loginLoading||!ucForm.username.trim()||!ucForm.password">
          {{ loginLoading ? '登录中...' : '登录' }}
        </button>
      </div>
      <div v-else style="display:flex;flex-direction:column;gap:16px;">
        <div>
          <label style="font-size:12px;display:block;margin-bottom:6px;color:var(--text-secondary);">昵称</label>
          <input v-model="quickForm.nickname" type="text" class="login-input" style="width:100%;padding:12px 16px;border-radius:var(--radius-sm);font-size:14px;" placeholder="给自己起个名字" @keyup.enter="quickLogin">
        </div>
        <button class="login-btn" @click="quickLogin" :disabled="!quickForm.nickname.trim()">开始挑战 →</button>
      </div>
      <button v-if="hasSession" @click="continueSession" style="width:100%;margin-top:12px;padding:10px;border-radius:var(--radius-sm);font-size:12px;color:var(--text-muted);background:rgba(255,255,255,0.04);border:1px solid var(--card-border);cursor:pointer;">继续上次挑战</button>
    </div>
  </div>
  <div class="login-right split-bg" style="flex:1;display:flex;align-items:center;justify-content:center;padding:48px;">
    <div style="max-width:420px;">
      <div style="font-size:56px;margin-bottom:24px;">🎯</div>
      <h2 style="font-size:28px;font-weight:700;margin-bottom:16px;line-height:1.4;">说一个目标，AI帮你拆解每一天</h2>
      <div style="display:flex;flex-direction:column;gap:16px;margin-top:32px;">
        <div class="glass feature-card"><span style="font-size:24px;">🤖</span><div><div class="ft-title">AI生成计划</div><div class="ft-desc">说"戒烟30天"，AI生成每日任务</div></div></div>
        <div class="glass feature-card"><span style="font-size:24px;">✏️</span><div><div class="ft-title">一键打卡+心得</div><div class="ft-desc">极简操作，3秒完成打卡</div></div></div>
        <div class="glass feature-card"><span style="font-size:24px;">🔥</span><div><div class="ft-title">打卡热力图</div><div class="ft-desc">可视化你的坚持轨迹</div></div></div>
        <div class="glass feature-card"><span style="font-size:24px;">📤</span><div><div class="ft-title">分享成就</div><div class="ft-desc">生成精美卡片分享好友</div></div></div>
      </div>
    </div>
  </div>
</div>
<script>
const { createApp, ref, onMounted } = Vue
window.api = new NexusApi({ baseUrl: (window.PATH_PREFIX || '') + '/api/v1', tokenKey: 'uc_access_token' })
createApp({
  setup() {
    const mode = ref('uc')
    const ucForm = ref({ username: '', password: '' })
    const quickForm = ref({ nickname: '' })
    const loginLoading = ref(false)
    const loginError = ref('')
    const hasSession = ref(false)
    onMounted(() => { if (localStorage.getItem('lc_user_id')) hasSession.value = true })
    async function ucLogin() {
      if (!ucForm.value.username.trim() || !ucForm.value.password) return
      loginLoading.value = true
      loginError.value = ''
      try {
        const res = await window.api.post('/auth/login', {
          username: ucForm.value.username.trim(),
          password: ucForm.value.password,
        })
        const d = res.data || res
        if (!d.access_token) throw new Error('登录失败：未获取到令牌')
        localStorage.setItem('uc_access_token', d.access_token)
        const user = d.user || {}
        const uid = user.id || user.user_id || user.username || ucForm.value.username.trim()
        const nick = user.nickname || user.name || user.username || ucForm.value.username.trim()
        localStorage.setItem('lc_user_id', String(uid))
        localStorage.setItem('lc_nickname', String(nick))
        window.location.href = '/'
      } catch (e) {
        loginError.value = e.message || '登录失败，请检查用户名和密码'
      } finally {
        loginLoading.value = false
      }
    }
    function quickLogin() {
      const name = quickForm.value.nickname.trim()
      if (!name) return
      const uid = 'cp_' + name + '_' + Math.random().toString(36).slice(2, 8)
      localStorage.setItem('lc_user_id', uid)
      localStorage.setItem('lc_nickname', name)
      window.location.href = '/'
    }
    function continueSession() { window.location.href = '/' }
    return { mode, ucForm, quickForm, loginLoading, loginError, hasSession, ucLogin, quickLogin, continueSession }
  }
}).mount('#app')
</script>
</body>
</html>
