<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>挑战星球 · AI打卡教练</title>
<script>window.PATH_PREFIX = window.PATH_PREFIX || ''</script>
<link rel="stylesheet" href="/static/style.css?v=5">
<script src="https://cdn.bootcdn.net/ajax/libs/vue/3.5.13/vue.global.prod.min.js"></script>
<script src="/static/nexus-ui/js/nexus-api-error.js?v=5"></script>
<script src="/static/nexus-ui/js/nexus-api.js?v=5"></script>
<style>
.split-bg { background: radial-gradient(circle at 20% 30%, rgba(99,91,255,.18), transparent 55%), radial-gradient(circle at 80% 80%, rgba(52,211,153,.1), transparent 50%); }
.login-input { background: rgba(11,13,26,.45); border: 1px solid var(--card-border); transition: all .2s; color: var(--text-primary); }
.login-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); outline: none; }
.login-btn { padding: 13px; border: none; border-radius: var(--radius-sm); background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: #fff; font-weight: 600; cursor: pointer; font-size: 15px; transition: all .2s; box-shadow: 0 4px 20px var(--primary-glow); }
.login-btn:hover:not(:disabled) { transform: translateY(-1px); }
.login-btn:disabled { opacity: .5; cursor: not-allowed; box-shadow: none; }
.feature-card { padding: 14px; display: flex; align-items: center; gap: 12px; }
.feature-card .ft-title { font-weight: 600; font-size: 14px; }
.feature-card .ft-desc { font-size: 12px; color: var(--text-secondary); }
.continue-btn { width: 100%; margin-top: 12px; padding: 10px; border-radius: var(--radius-sm); font-size: 12px; color: var(--text-secondary); background: rgba(148,163,255,.05); border: 1px solid var(--card-border); cursor: pointer; }
.continue-btn:hover { background: var(--card-hover); }
@media (max-width: 768px) { .login-right { display: none; } }
</style>
</head>
<body style="background:var(--bg-grad);color:var(--text-primary);min-height:100vh;">
<div id="app" v-cloak style="display:flex;min-height:100vh;">
  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:32px;">
    <div class="glass" style="padding:32px;max-width:380px;width:100%;border-radius:var(--radius-lg);">
      <div style="text-align:center;margin-bottom:28px;">
        <div style="font-size:48px;margin-bottom:8px;">🌍</div>
        <h1 style="font-size:24px;font-weight:700;">挑战星球</h1>
        <p style="font-size:13px;margin-top:4px;color:var(--text-secondary);">AI为你规划每一天的坚持</p>
      </div>
      <div style="display:flex;flex-direction:column;gap:16px;">
        <div>
          <label style="font-size:12px;display:block;margin-bottom:6px;color:var(--text-secondary);">用户名</label>
          <input v-model="form.username" type="text" class="login-input" style="width:100%;padding:12px 16px;border-radius:var(--radius-sm);font-size:14px;" placeholder="请输入用户名" @keyup.enter="doLogin">
        </div>
        <div>
          <label style="font-size:12px;display:block;margin-bottom:6px;color:var(--text-secondary);">密码</label>
          <input v-model="form.password" type="password" class="login-input" style="width:100%;padding:12px 16px;border-radius:var(--radius-sm);font-size:14px;" placeholder="请输入密码" @keyup.enter="doLogin">
        </div>
        <p v-if="loginError" style="font-size:12px;color:var(--red);line-height:1.5;">{{ loginError }}</p>
        <button class="login-btn" @click="doLogin" :disabled="loginLoading||!form.username.trim()||!form.password">
          {{ loginLoading ? '登录中...' : '登录' }}
        </button>
      </div>
      <button v-if="hasSession" @click="continueSession" class="continue-btn">继续上次挑战 →</button>
    </div>
  </div>
  <div class="login-right split-bg" style="flex:1;display:flex;align-items:center;justify-content:center;padding:48px;">
    <div style="max-width:420px;">
      <h2 style="font-size:28px;font-weight:700;margin-bottom:8px;line-height:1.4;">说一个目标，<br>AI帮你拆解每一天</h2>
      <p style="font-size:14px;color:var(--text-secondary);">组队互相监督，让坚持看得见</p>
      <div style="display:flex;flex-direction:column;gap:14px;margin-top:32px;">
        <div class="glass feature-card"><span style="font-size:24px;">🌍</span><div><div class="ft-title">星系进度</div><div class="ft-desc">每个挑战都是一颗行星，点亮它的每一步轨迹</div></div></div>
        <div class="glass feature-card"><span style="font-size:24px;">🤖</span><div><div class="ft-title">AI教练</div><div class="ft-desc">自动生成每日计划，打卡后还有暖心反馈</div></div></div>
        <div class="glass feature-card"><span style="font-size:24px;">👥</span><div><div class="ft-title">小队互相监督</div><div class="ft-desc">邀请好友组队，全员打卡人人加分</div></div></div>
        <div class="glass feature-card"><span style="font-size:24px;">🎁</span><div><div class="ft-title">积分宝箱</div><div class="ft-desc">连续打卡积分递增，随机掉落惊喜宝箱</div></div></div>
      </div>
    </div>
  </div>
</div>
<script>
const { createApp, ref, onMounted } = Vue
window.api = new NexusApi({ baseUrl: (window.PATH_PREFIX || '') + '/api/v1', tokenKey: 'uc_access_token' })
createApp({
  setup() {
    const form = ref({ username: '', password: '' })
    const loginLoading = ref(false)
    const loginError = ref('')
    const hasSession = ref(false)
    onMounted(() => { if (localStorage.getItem('uc_access_token')) hasSession.value = true })
    async function doLogin() {
      if (!form.value.username.trim() || !form.value.password) return
      loginLoading.value = true
      loginError.value = ''
      try {
        const res = await window.api.post('/auth/login', { username: form.value.username.trim(), password: form.value.password })
        const d = res.data || res
        if (!d.access_token) throw new Error('登录失败：未获取到令牌')
        localStorage.setItem('uc_access_token', d.access_token)
        if (d.refresh_token) localStorage.setItem('uc_refresh_token', d.refresh_token)
        const user = d.user || {}
        localStorage.setItem('cp_user_id', String(user.id || user.user_id || user.username || form.value.username.trim()))
        localStorage.setItem('cp_nickname', String(user.nickname || user.name || user.username || form.value.username.trim()))
        window.location.href = (window.PATH_PREFIX || '') + '/'
      } catch (e) {
        loginError.value = (window.mapHttpError && e.name === 'NexusApiError') ? window.mapHttpError(e) : (e.message || '登录失败，请检查用户名和密码')
      } finally {
        loginLoading.value = false
      }
    }
    function continueSession() { window.location.href = (window.PATH_PREFIX || '') + '/' }
    return { form, loginLoading, loginError, hasSession, doLogin, continueSession }
  }
}).mount('#app')
</script>
</body>
</html>
