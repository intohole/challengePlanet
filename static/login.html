<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>挑战星球 · AI打卡教练</title>
<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
.split-bg { background: radial-gradient(circle at 20% 50%, rgba(99,102,241,.15), transparent 50%), radial-gradient(circle at 80% 80%, rgba(139,92,246,.12), transparent 50%); }
.login-input { background: rgba(30,41,59,.6); border: 1px solid rgba(99,102,241,.2); transition: all .2s; }
.login-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,.15); outline: none; }
@media (max-width: 768px) { .login-right { display: none; } .login-left { width: 100%; } }
</style>
</head>
<body style="background: var(--bg-grad); color: var(--text-primary);">
<div id="app" class="min-h-screen flex">
  <div class="login-left flex-1 flex items-center justify-center p-8">
    <div class="glass p-8 max-w-sm w-full" style="border-radius: var(--radius-xl);">
      <div class="text-center mb-8">
        <div class="text-5xl mb-2">🌍</div>
        <h1 class="text-2xl font-bold">挑战星球</h1>
        <p class="text-sm mt-1" style="color: var(--text-muted);">AI为你规划每一天的坚持</p>
      </div>
      <div class="space-y-4">
        <div>
          <label class="text-xs block mb-1.5" style="color: var(--text-tertiary);">昵称</label>
          <input v-model="nickname" type="text" placeholder="给自己起个名字" class="login-input w-full px-4 py-3 rounded-xl text-sm" style="color: var(--text-primary);">
        </div>
        <button @click="enterApp" :disabled="!nickname.trim()" class="btn-primary w-full py-3 rounded-xl text-sm font-bold">
          开始挑战 →
        </button>
        <button v-if="hasSession" @click="continueSession" class="w-full py-2.5 rounded-xl text-xs" style="color: var(--text-muted); background: rgba(30,41,59,.4);">
          继续上次挑战
        </button>
      </div>
    </div>
  </div>
  <div class="login-right flex-1 split-bg flex items-center justify-center p-12">
    <div class="max-w-md">
      <div class="text-6xl mb-6">🎯</div>
      <h2 class="text-3xl font-bold mb-4">说一个目标，AI帮你拆解每一天</h2>
      <div class="space-y-4 mt-8">
        <div class="glass p-4 flex items-center gap-3">
          <span class="text-2xl">🤖</span>
          <div><div class="font-bold text-sm">AI生成计划</div><div class="text-xs" style="color: var(--text-muted);">说"戒烟30天"，AI生成每日任务</div></div>
        </div>
        <div class="glass p-4 flex items-center gap-3">
          <span class="text-2xl">✏️</span>
          <div><div class="font-bold text-sm">一键打卡+心得</div><div class="text-xs" style="color: var(--text-muted);">极简操作，3秒完成打卡</div></div>
        </div>
        <div class="glass p-4 flex items-center gap-3">
          <span class="text-2xl">💡</span>
          <div><div class="font-bold text-sm">AI智能反馈</div><div class="text-xs" style="color: var(--text-muted);">每次打卡都有AI教练鼓励和建议</div></div>
        </div>
        <div class="glass p-4 flex items-center gap-3">
          <span class="text-2xl">📤</span>
          <div><div class="font-bold text-sm">分享成就</div><div class="text-xs" style="color: var(--text-muted);">生成精美打卡卡片分享好友</div></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
<script>
const { createApp, ref, onMounted } = Vue
createApp({
  setup() {
    const nickname = ref('')
    const hasSession = ref(false)
    onMounted(() => {
      const uid = localStorage.getItem('lc_user_id')
      if (uid) hasSession.value = true
    })
    function enterApp() {
      const name = nickname.value.trim()
      if (!name) return
      const uid = 'cp_' + name + '_' + Math.random().toString(36).slice(2, 8)
      localStorage.setItem('lc_user_id', uid)
      window.location.href = '/'
    }
    function continueSession() {
      window.location.href = '/'
    }
    return { nickname, hasSession, enterApp, continueSession }
  }
}).mount('#app')
</script>
</body>
</html>
